# =============================================================================
# REY LOADER — Configuration Reference
#
# Documents every available setting across all rey_loader config files.
# Values shown are examples or defaults. This file is never loaded by the app.
# =============================================================================

# Config file names used by this app:
#   app.yaml
#   app/stages.yaml
#   app/sql_configs.yaml
#   app/llm_configs.yaml
#   diagnostics/default.yaml
#   data_sources/data_source.{name}.yaml


# =============================================================================
# FILE: app.yaml
#
# App registry metadata. Loaded by installation tooling.
# =============================================================================

name: rey_loader
# Required. Must be rey_loader.

enabled: true
# Options: true, false.

version: v01
# Informational version label.


# =============================================================================
# FILE: config.{env}.yaml
#
# Main app config. One per environment (dev, test, prod).
# =============================================================================

jsonl_path: ~/logs/rey_loader/rey_loader.{operation}.{timestamp}.jsonl
# JSONL log file path.
# Tokens substituted at runtime:
#   {operation}  — CLI command being run
#   {timestamp}  — run timestamp

chunk_size: 500
# Number of rows per database insert batch.
# Larger values improve throughput; smaller values reduce memory pressure.
# Default: 500

# ---------------------------------------------------------------------------
# app_hooks
# SQL commands that fire once per CLI invocation — not per row or file.
# Each entry references a named sql_config from app/sql_configs.yaml.
# ---------------------------------------------------------------------------

app_hooks:
  - name:       begin_batch
    # Hook name. Informational — appears in logs.

    sql_config: begin_batch
    # Name of the sql_config entry to execute. Must exist in sql_configs.yaml.

    hook:       hooks.pre_run
    # When to fire.
    # Options:
    #   hooks.pre_run   — fires before any data source is processed
    #   hooks.post_run  — fires after all data sources are processed

  - name:       end_batch
    sql_config: end_batch
    hook:       hooks.post_run

# ---------------------------------------------------------------------------
# rejection
# When present, rey_loader writes one row to this table for every column
# error in a rejected transform file. Omit the entire block to disable
# rejection logging.
# ---------------------------------------------------------------------------

rejection:
  connection: SQLServer_MyDB
  # Named sql_config entry of type: connection. Required when block is present.

  table: NaviStage.dbo.TransformRejection
  # Schema-qualified destination table for rejection rows. Required.


# =============================================================================
# FILE: app/stages.yaml
#
# Defines external stage runners that rey_loader orchestrates via subprocess.
# Each stage is independent — rey_loader only controls when it runs and
# what arguments it receives.
# =============================================================================

stages:
  ftp_sync:
    python:  ~/python/.venv/bin/python
    # Path to the Python interpreter for this stage.

    script:  ~/apps/ftp_sync/main.py
    # Absolute path to the stage entry point script.

    args: []
    # Extra arguments passed before rey_loader appends its runtime env value.
    # Do not include the runtime environment value here.
    # Example: ["--dry-run", "--verbose"]


# =============================================================================
# FILE: app/sql_configs.yaml
#
# Named SQL hooks and connections. Bindings in app_hooks, transform_hooks,
# and load_hooks reference sql_configs by name.
# =============================================================================

sql_configs:

  - name: SQLServer_MyDB
    # Required unique name.

    type: connection
    # Options:
    #   connection — database connection definition
    #   procedure  — stored procedure hook
    #   sql_file   — execute a SQL file from the SQL config directory
    # Default when omitted for hook execution: procedure.

    driver: ODBC Driver 17 for SQL Server
    host: localhost
    database: MyDB
    user: my_user
    password: env.MY_DB_PASSWORD
    # Connection fields are backend-specific and are consumed by rey_lib DB
    # adapters. Password may be an env.<name> reference.

  - name: begin_batch
    type: procedure
    connection: SQLServer_MyDB
    # Must reference a type: connection sql_config.

    proc: dbo.pIns_Batch
    # Required for type: procedure.

    params:
      - name: BatchStartDT
        source: ctx.batch_start_dt
      - name: SourceName
        source: data_source.name
      - name: LiteralValue
        source: "literal text"
    # Param source values:
    #   ctx.<field>         — value from runtime ctx
    #   data_source.<field> — value from current data source
    #   any other string    — passed as a literal value

    output_params:
      - name: BatchID
        sql_type: INT
        ctx_var: batch_id
        row_column: BatchID
    # output_params are optional.
    # sql_type default: NVARCHAR(MAX)
    # ctx_var writes the returned value to ctx.<ctx_var>.
    # row_column injects the returned value into every transformed row.

  - name: create_staging_objects
    type: sql_file
    connection: SQLServer_MyDB
    file: create_staging_objects.sql
    # Required for type: sql_file. Resolved from the SQL config directory.


# =============================================================================
# FILE: app/llm_configs.yaml
#
# Named LLM hook definitions. Hook bindings may use llm_config instead of
# sql_config.
# =============================================================================

llm_configs:

  - name: post_load_summary
    # Required unique name.

    llm: primary
    # Named LLM instance from the shared installation ctx.llm config.

    system_prompt: "You are a data pipeline monitor. Be concise."
    # Optional system message.

    prompt_template: |
      File {ctx.current_file_name} loaded {ctx.step_record_count} rows.
    # Template tokens may reference ctx.<field> and data_source.<field>.

    max_tokens: 100
    # Optional integer.

    output_params:
      - name: summary
        ctx_var: ai_load_summary
        row_column: LoadSummary
    # ctx_var writes response content to ctx.
    # row_column injects response content into transformed rows.


# =============================================================================
# FILE: diagnostics/default.yaml
#
# JSONL diagnostic controls by severity. Used by rey_lib JSONL logging.
# =============================================================================

diagnostics:

  info:
    enabled: true
    # Options: true, false.

    dump_ctx: false
    # Options: true, false.

    ctx_fields:
      - env
      - batch_id
      - data_sources.name
    # Optional list of ctx fields to include.

  warning:
    enabled: true
    dump_ctx: true
    ctx_fields:
      - current_file_name
      - row_num

  error:
    enabled: true
    dump_ctx: true
    dump_stack_trace: true
    dump_sql: true
    dump_rows_on_error: 5
    # dump_rows_on_error is an optional integer row sample count.
    ctx_fields:
      - current_file_name
      - current_file_path
      - step_record_count
      - log_file


# =============================================================================
# FILE: data_sources/data_source.{name}.yaml
#
# One or more data source entries. rey_loader transforms and loads these using
# rey_lib.files.file_loader.
# =============================================================================

data_sources:

  - name: my_source
    # Required unique name.

    enabled: true
    # Options: true, false. Default: true.

    max_files_per_run: 10
    # Optional integer cap per run.

    paths:
      inbox_path: ~/data/my_source/inbox
      converted_path: ~/data/my_source/converted
      processing_path: ~/data/my_source/processing
      archive_path: ~/data/my_source/archive
      rejected_path: ~/data/my_source/rejected
      # Path keys are referenced by transforms, loads, and movement rules.
      # Any path key can be referenced by name, for example output_dest:
      # converted_path or movement from: inbox_path.

    file_movements:
      filename_pattern: "*"
      name_transforms:
        - type: append_timestamp
      destination: inbox_path
    # Optional pre-transform intake movements. Supported name transform types
    # currently include append_timestamp.

    transform_hooks:
      - name: begin_transform_step
        sql_config: begin_batch_step
        hook: hooks.pre_transform
      - name: end_transform_step
        sql_config: end_batch_step
        hook: hooks.post_transform
    # Hook phase values used by rey_loader:
    #   hooks.pre_run
    #   hooks.post_run
    #   hooks.pre_transform
    #   hooks.post_transform
    #   hooks.pre_load
    #   hooks.post_load
    # Each binding must set either sql_config or llm_config.

    load_hooks:
      - name: begin_load_step
        sql_config: begin_batch_step
        hook: hooks.pre_load
      - name: end_load_step
        sql_config: end_batch_step
        hook: hooks.post_load

    transforms:
      - name: my_transform
        version: v01
        file_type: CSV
        # Options currently consumed by readers: CSV, Excel.
        # Default: CSV.

        encoding: utf-8-sig
        # Common values: utf-8-sig, utf-8, latin-1, cp1252.
        # Default: utf-8-sig.

        delimiter: ","
        # CSV delimiter. Common values: ",", "|", "\t".
        # Default: ",".

        file_pattern: "*.csv"
        # Glob pattern or list of glob patterns matched against inbox files.
        # Date/token placeholders such as {yyyymmdd} are treated as * for discovery.
        # Examples: "*.csv", "tran_{yyyymmdd}.csv", ["*.ps1", "*.tr1"]
        # Default: "*"

        date_format: yyyymmdd
        # Informational helper used in filename/date token conventions.

        header: "Source Column A,Source Column B"
        # Expected header string. Header must match before rows transform.

        row_filter:
          - column: Status
            equals: ACTIVE
        # Optional filters. Omit or [] to keep all rows.

        output:
          output_dest: converted_path
          # Must reference a key under paths.

          version: v01
          file:
            name: "{base_file_name}_{version}.csv"
          # Supported filename tokens include:
          #   {base_file_name}
          #   {version}
          #   {incoming_file_name}

        movements:
          success:
            - move:
                from: inbox_path
                to: processing_path
          failure:
            - move:
                from: inbox_path
                to: rejected_path
        # Movement from/to values reference keys under paths.

        columns:
          - name: output_column_a
            source: Source Column A

          - name: output_column_b
            source: Source Column B

          - name: trade_date
            source: Trade Date
            transform:
              type: date
              format: "%Y%m%d"
              allow_blank: true

          - name: amount
            source: Amount
            transform:
              type: numeric
              strip_chars: ",$"
              allow_blank: true

          - name: whole_number
            source: Whole Number
            transform:
              type: numeric
              cast_to: integer

          - name: code
            source: Description
            transform:
              type: regex_extract
              pattern: "([A-Z]+)"
              group: 1
              cast_to: string

          - name: sensitive_value
            source: Sensitive Value
            transform:
              type: encrypt
              key: env.MY_ENCRYPTION_KEY

          - name: broker
            transform:
              type: constant
              value: my_broker

          - name: source_file
            transform:
              type: constant
              value: "{incoming_file_name}"
        # Native transform column shape. Each output column is defined once:
        #   name      — output column name written to converted CSV/load table
        #   source    — source header name, positional index, or fixed-width range
        #   transform — optional inline transform config
        # Omit transform for pass-through text/boolean columns.
        # Use transform.type: constant for values previously modeled as
        # separate constants.
        # This list-based shape is the only supported shape for new configs.
        # Old mapping-style columns, field_transforms, and constants must be
        # converted before use.
        # Common transform type values:
        #   constant
        #   context
        #   text
        #   date
        #   datetime
        #   time
        #   regex_date
        #   numeric
        #   regex_extract
        #   encrypt
        # Common options:
        #   value, format, allow_blank, strip_chars, pattern, group, cast_to, key
        # cast_to values used for SQL typing: string, int, integer, float, double.
        # file_redactor profile type mapping for LLM-generated loader YAML:
        #   integer -> type: numeric
        #   decimal -> type: numeric
        #   date    -> type: date
        #   datetime -> type: datetime
        #   boolean/text -> no transform unless a downstream schema requires one

    loads:
      - name: my_load
        version: v01

        load:
          connection: SQLServer_MyDB
          # Must reference a type: connection sql_config.

          destination_table: dbo.MyTable
          # Schema-qualified table. For cross-db SQL Server use db.schema.table.

        movements:
          success:
            - move:
                from: converted_path
                to: archive_path
          failure:
            - move:
                from: converted_path
                to: rejected_path


# =============================================================================
# CLI — rey_loader command-line interface
#
# All parameters are passed as --name value. Boolean flags use --name / omit.
# =============================================================================

cli:
  invocation: "python main.py [shared_parameters] --stage <stage>"
  # Structured CLI contract for LLM/pipeline authors.
  # Pipeline steps for rey_loader do not use a subcommand; args are appended
  # directly after the shared parameters.

  shared_parameters:
    - name: config-path
      required: false
      value_type: path
      description: Path to an app config file, installation config file, or config root.

    - name: config-dir
      required: false
      value_type: path
      description: Directory containing config.<env>.yaml.

    - name: environment
      required: false
      value_type: choice
      possible_values: [development, test, production]
      description: Runtime environment. Required when config-path is omitted.

    - name: installation
      required: false
      value_type: string
      description: Installation name.

    - name: set
      required: false
      repeatable: true
      value_type: KEY=VALUE
      description: Override an environment variable for this run.

    - name: pipeline-name
      required: false
      value_type: string
      description: Pipeline name supplied by pipeline_coordinator.

    - name: pipeline-run-id
      required: false
      value_type: string
      description: Unique pipeline run identifier supplied by pipeline_coordinator.

    - name: pipeline-step-name
      required: false
      value_type: string
      description: Pipeline step name supplied by pipeline_coordinator.

    - name: pipeline-step-id
      required: false
      value_type: string
      description: Optional unique pipeline step identifier.

    - name: log-file
      required: false
      value_type: path
      description: Shared pipeline JSONL log path.

  parameters:
    - name: stage
      required: true
      value_type: choice
      possible_values: [all, sync, transform, load]
      description: Ingestion stage to run.
      values:
        all: Run sync, transform, and load in order.
        sync: Run the configured ftp_sync stage only.
        transform: Transform inbox files to converted output.
        load: Load converted files into the database.

  examples:
    - "python main.py --config-path ~/installations/ccc/configs/v01/config.yaml --stage all"
    - "python main.py --config-path ~/installations/ccc/configs/v01/config.yaml --stage load"
