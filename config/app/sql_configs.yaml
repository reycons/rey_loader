# =============================================================================
# SQL Configs: Stored Procedures and SQL Files
#
# Named sql_config entries referenced by hook bindings at three levels:
#   hooks.pre_run         — fires once before any data source is processed
#   hooks.post_run        — fires once after all data sources are processed
#   hooks.pre_transform   — fires before transform_files for a data source
#   hooks.post_transform  — fires after transform_files for a data source
#   hooks.pre_load        — fires before load_files for a load config
#   hooks.post_load       — fires after load_files for a load config
#
# Procedure output_params are written to ctx via ctx_var.
# Output params with row_column are auto-injected into every transformed row.
# =============================================================================

sql_configs:


  # ---------------------------------------------------------------------------
  # SQLServer_NaviControl_local
  #
  # SQL Server connection for NaviControl database
  # ---------------------------------------------------------------------------
  - name: SQLServer_NaviControl_local
    type: connection
    driver: ODBC Driver 17 for SQL Server
    host: <your_server>
    database: NaviControl
    user: <your_user>
    password: env.NAVICONTROL_PASSWORD

  # ---------------------------------------------------------------------------
  # create_table_if_missing
  #
  # Creates a table if it does not exist, using a schema-qualified table name
  # and a CSV string of columns with datatypes. Uses pRun_LoggedSQL for execution.
  #
  # Procedure: dbo.pCreateTableIfMissing
  #   @TableName NVARCHAR(256)   -- Schema-qualified table name (e.g. 'dbo.MyTable')
  #   @Columns   NVARCHAR(MAX)   -- CSV: 'col1 INT, col2 VARCHAR(50), ...'
  #   @BatchID   INT = NULL      -- Optional batch context
  # ---------------------------------------------------------------------------
  - name: create_table_if_missing
    type: procedure
    connection: SQLServer_NaviControl_local
    proc: dbo.pCreateTableIfMissing
    params:
      - name: TableName
        source: ctx.table_name
      - name: Columns
        source: ctx.table_columns
      - name: BatchID
        source: ctx.batch_id
  #
  # Procedure: NaviControl.dbo.pIns_Batch
  #   @BatchStartDT      datetime       — start timestamp (ctx.batch_start_dt)
  #   @BatchDescription  nvarchar(250)  — OS command line that started the run
  #   @LogFile           nvarchar(max)  — log file path (ctx.log_file)
  #   @BatchID           int OUTPUT     — assigned batch ID returned to ctx
  # ---------------------------------------------------------------------------

  - name:       begin_batch
    type:       procedure
    connection: SQLServer_NaviControl_local
    proc:       NaviControl.dbo.pIns_Batch
    params:
      - name:   BatchStartDT
        source: ctx.batch_start_dt     # datetime set at startup before pipeline runs
      - name:   BatchDescription
        source: ctx.cli_call           # OS invocation string, e.g. "python main.py --env dev --stage all"
      - name:   LogFile
        source: ctx.log_file           # full path of the session log file
    output_params:
      - name:       BatchID
        sql_type:   INT
        ctx_var:    batch_id           # written to ctx.batch_id
        row_column: BatchID            # auto-appended to every transformed row

  # ---------------------------------------------------------------------------
  # end_batch
  #
  # Stamps the batch end time on the dbo.Batch row created by begin_batch.
  # Bound at the run level (hooks.post_run) — runs once per CLI invocation,
  # after every data source has been processed.
  #
  # Procedure: NaviControl.dbo.pUpd_BatchEnd
  #   @BatchID       int       — the batch created by begin_batch
  #   @BatchEndDT    datetime  — optional; proc defaults to GETDATE() if NULL
  # ---------------------------------------------------------------------------

  - name:       end_batch
    type:       procedure
    connection: SQLServer_NaviControl_local
    proc:       NaviControl.dbo.pUpd_BatchEnd
    params:
      - name:   BatchID
        source: ctx.batch_id           # set by begin_batch output param

  # ---------------------------------------------------------------------------
  # begin_batch_step
  #
  # Logs the start of a step within the overall batch. Bound at the transform
  # and load levels (hooks.pre_transform / hooks.pre_load) so each data source
  # transform and each load entry gets its own step row, nested under the run's
  # batch via ParentBatchStepID.
  #
  # The returned BatchStepID is written to ctx.batch_step_id so a matching
  # end_batch_step (or nested children) can reference it.
  #
  # Procedure: NaviControl.dbo.pIns_BatchStep
  #   @BatchID            int             — parent batch ID (ctx.batch_id)
  #   @severity           int             — severity level (0 = info)
  #   @source             nvarchar(1000)  — name of the source/stage emitting the step
  #   @message            nvarchar(max)   — human-readable description
  #   @RecordCount        bigint          — row count for this step (0 at start)
  #   @ParentBatchStepID  int = null      — optional parent step for nested logging
  #   @BatchStepID        int OUTPUT      — assigned step ID returned to ctx
  # ---------------------------------------------------------------------------

  - name:       begin_batch_step
    type:       procedure
    connection: SQLServer_NaviControl_local
    proc:       NaviControl.dbo.pIns_BatchStep
    params:
      - name:   BatchID
        source: ctx.batch_id              # parent batch — set by begin_batch
      - name:   severity
        source: "0"                       # 0 = info; literal value
      - name:   source
        source: ctx.cli_call              # what called the proc — the CLI
                                          # invocation (set in main.py from
                                          # sys.argv)
      - name:   message
        source: ctx.current_file_name     # filename being processed
      - name:   RecordCount
        source: "0"                       # row count is 0 at step start
      # ParentBatchStepID is omitted intentionally — the proc defaults it to
      # NULL. Top-level steps (transform/load) do not nest under another step;
      # add a `ParentBatchStepID` param here only when you need nested logging.
    output_params:
      - name:       BatchStepID
        sql_type:   BIGINT
        ctx_var:    batch_step_id         # written to ctx.batch_step_id

  # ---------------------------------------------------------------------------
  # end_batch_step
  #
  # Closes the BatchStep row opened by the matching begin_batch_step by
  # stamping BatchStepEndDT and (optionally) updating Severity, Message,
  # and RecordCount. The proc COALESCEs each optional param to its current
  # value when NULL, so passing only BatchStepID leaves the others intact.
  #
  # Procedure: NaviControl.dbo.pUpd_BatchStep_End
  #   @BatchStepID  bigint          — step to close (ctx.batch_step_id)
  #   @Severity     int = NULL      — optional; COALESCEs to existing
  #   @Message      nvarchar(max)   — optional; COALESCEs to existing
  #   @RecordCount  bigint = NULL   — optional; COALESCEs to existing
  # ---------------------------------------------------------------------------

  - name:       end_batch_step
    type:       procedure
    connection: SQLServer_NaviControl_local
    proc:       NaviControl.dbo.pUpd_BatchStep_End
    params:
      - name:   BatchStepID
        source: ctx.batch_step_id      # set by the matching begin_batch_step
      # Severity / Message / RecordCount intentionally omitted — the proc
      # uses COALESCE so omitted params preserve the existing row values.
      # Add params here (e.g. RecordCount sourced from a ctx var written by
      # transform/load) when you want to update them on close.

  # ---------------------------------------------------------------------------
  # alter_column_data_type
  #
  # Invoked by rey_lib's load pipeline when a bulk insert raises a
  # backend-specific truncation/type error. rey_lib populates the
  # ctx.alter_* variables before calling, so this entry's params just
  # need to point at them.
  #
  # Procedure: NaviStage.dbo.p_AlterColumnDataType
  #   @TableName  nvarchar(256)  — fully-qualified target table
  #   @ColumnName nvarchar(128)  — column to alter
  #   @DataType   nvarchar(256)  — new SQL type (e.g. 'NVARCHAR(150)')
  #   @BatchID    int = NULL     — current batch for audit
  # ---------------------------------------------------------------------------

  - name:       alter_column_data_type
    type:       procedure
    connection: SQLServer_NaviStage_local
    proc:       NaviStage.dbo.p_AlterColumnDataType
    params:
      - name:   TableName
        source: ctx.alter_table
      - name:   ColumnName
        source: ctx.alter_column
      - name:   DataType
        source: ctx.alter_data_type
      - name:   BatchID
        source: ctx.batch_id
