# =============================================================================
# SQL Configs: Stored Procedures and SQL Files
#
# Named sql_config entries referenced by data source hooks:
#   hooks.pre_transform   — runs before transform_files for a data source
#   hooks.post_transform  — runs after transform_files for a data source
#   hooks.post_load       — runs after load_files for a data source
#
# Procedure output_params are written to ctx via ctx_var.
# Output params with row_column are auto-injected into every transformed row.
# =============================================================================

sql_configs:

  # ---------------------------------------------------------------------------
  # begin_batch
  #
  # Inserts a batch log row into dbo.Batch and returns the new BatchID as an
  # output parameter. The BatchID is written to ctx.batch_id and injected into
  # every transformed row as the BatchID column.
  #
  # Procedure: NaviControl.dbo.pIns_Batch
  #   @BatchStartDT      datetime       — start timestamp (ctx.batch_start_dt)
  #   @BatchDescription  nvarchar(250)  — data source name (data_source.name)
  #   @LogFile           nvarchar(max)  — log file path (ctx.log_file)
  #   @BatchID           int OUTPUT     — assigned batch ID returned to ctx
  # ---------------------------------------------------------------------------

  - name:       begin_batch
    type:       procedure
    connection: SQLServer_NaviControl_local
    proc:       NaviControl.dbo.pIns_Batch
    params:
      - name:   BatchStartDT
        source: ctx.batch_start_dt     # datetime set at startup before pipeline runs
      - name:   BatchDescription
        source: data_source.name       # e.g. "advantage" — identifies the source
      - name:   LogFile
        source: ctx.log_file           # full path of the session log file
    output_params:
      - name:       BatchID
        sql_type:   INT
        ctx_var:    batch_id           # written to ctx.batch_id
        row_column: BatchID            # auto-appended to every transformed row

  # ---------------------------------------------------------------------------
  # end_batch
  #
  # Stamps the batch end time on the dbo.Batch row created by begin_batch.
  # Runs post_load so it only fires after all files for the source are loaded.
  #
  # Procedure: NaviControl.dbo.pUpd_BatchEnd
  #   @BatchID       int       — the batch created by begin_batch
  #   @BatchEndDT    datetime  — optional; proc defaults to GETDATE() if NULL
  # ---------------------------------------------------------------------------

  - name:       end_batch
    type:       procedure
    connection: SQLServer_NaviControl_local
    proc:       NaviControl.dbo.pUpd_BatchEnd
    params:
      - name:   BatchID
        source: ctx.batch_id           # set by begin_batch output param
