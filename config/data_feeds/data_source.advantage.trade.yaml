# =============================================================================
# Data Source: Advantage
#
# Defines the full pipeline for Advantage futures trade files:
#   1. transforms  — how to read, validate, and reshape raw files from the FTP
#                    inbox into a clean output format ready for loading
#   2. loads       — how to take the transformed output and load it into the
#                    database, including file movements on success and failure
#
# Each transform and load is versioned so that format changes can be handled
# by adding a new version rather than modifying existing logic.
# =============================================================================

data_sources:

  - name: advantage

    # -------------------------------------------------------------------------
    # Paths
    #
    # All folder locations for this data source. These are referenced by name
    # in transform and load movements below — never hard-coded in those sections.
    #
    #   inbox_path      Files arrive here from the FTP sync stage
    #   processing_path Files move here after a successful transform
    #   loaded_path     Files move here after a successful database load
    #   rejected_path   Files move here when any stage fails
    #   archive_path    Transformed output files are archived here after loading
    # -------------------------------------------------------------------------

    paths:
      inbox_path:       D:\FTP\Advantage
      processing_path:  D:\FTP\Advantage\Processing
      loaded_path:      D:\DataFeeds\Advantage\Loaded
      rejected_path:    D:\FTP\Advantage\Rejected
      archive_path:     D:\DataFeeds\Advantage\Archive

    # -------------------------------------------------------------------------
    # Transforms
    #
    # A transform defines how to read a raw source file and produce a clean
    # output file ready for loading. Each transform is versioned — when the
    # source file format changes, add a new version rather than editing this one.
    #
    # Transform stages:
    #   1. Match files in inbox_path using file_pattern
    #   2. Validate the header against the expected header string
    #   3. Apply row_filter to discard invalid rows
    #   4. Map source columns to DB columns via columns:
    #   5. Apply field_transforms to clean and normalize values
    #   6. Inject constants (file names, record source)
    #   7. Write output file using the output pattern
    #   8. Move source file per movements: success or failure
    # -------------------------------------------------------------------------

    transforms:

      # -----------------------------------------------------------------------
      # Transform: advantage_transactions v01
      #
      # Reads the raw Advantage futures trade file. One row per trade.
      # File arrives as a CSV with no quoting, pipe-delimited records.
      # Date values use yyyymmdd format with no separators.
      #
      # Known characteristics of this format:
      #   - No RECORD ID column — trades identified by TRADE DATE + ACCOUNT
      #   - PROMPT DATE is frequently blank for non-futures rows
      #   - STRIKE PRICE and PUT/CALL are blank for outright futures
      #   - BUY/SELL is a text flag in this version (vs. numeric in others)
      #   - ENTRY DATE uses ISO separators (yyyy-mm-dd) unlike TRADE DATE
      #   - Fee columns default to 0 when not applicable — treat as numeric
      # -----------------------------------------------------------------------

      - name:         advantage_transactions
        version:      "v01"
        file_type:    CSV
        encoding:     utf-8-sig   # handles BOM-prefixed files from Windows exports
        date_format:  "yyyymmdd"  # used for file_pattern token substitution only
        file_pattern: "tran_{yyyymmdd}.csv"   # glob pattern to match inbox files

        # Expected header row — validated against the first line of each file.
        # If the file header does not match, the file is rejected before any
        # rows are processed.
        header: "TRADE DATE,OFFICE,ACCOUNT,A/C TYPE,BUY/SELL,QTY,EXCH ID,CONTRACT NAME,YYYY/MM,PROMPT DATE,STRIKE PRICE,PUT/CALL,PRINTABLE PRICE,TRADE TYPE,CARD/ORDER #,CURRENCY CODE,STYPE,FUTURES CODE,SUB CUSIP,CUSIP,GMI FIRM #,SALESCODE #,COMMENT CODE,GIVE IN/OUT,GIVE IN FIRM,TRADE PRICE,SPREAD,OPEN/CLOSE,EXECUTING BROKER,OPPOSITE BROKER,OPPOSITE FIRM,COMMISSION,COMM A/C TYPE,FEE 1 (CLEARING),FEE 1 A/C TYPE,FEE 2 (EXCHANGE),FEE 2 A/C TYPE,FEE 3 (NFA),FEE 3 A/C TYPE,BROKERAGE CHARGE,BKG A/C TYPE,GIVE IN CHARGE,G/I A/C TYPE,OTHER CHARGE,OTHER A/C TYPE,WIRE CHARGE,WIRE A/C TYPE,ENTRY DATE,DELETE CODE,GMI TRACER #,JOURNAL SEQUENCE,ROUND TURN/HALF TURN,DESCRIPTION,JOURNAL RECORD,SUB ACCOUNT,COMMENT F CODE,MISC.,2 DIGIT EXCHANGE,FUTURE/OPTION,MULTIPLIER,CLOSE PRICE,XTP ACCOUNT"

        # Output file written after a successful transform.
        # This file is what the load stage picks up — not the original inbox file.
        output:
          name: transaction
          version: "v01"
          file:
            pattern: "tran_{yyyymmdd}_{version}.csv"

        # File movements after the transform stage completes.
        # The original inbox file moves — the output file is written separately.
        movements:
          success:
            # Inbox file moves to processing after a clean transform.
            # It stays here until the load stage completes.
            - move:
                from: inbox_path
                to:   processing_path
          failure:
            # Any transform error — bad header, row errors — sends the file
            # to rejected. Error details are written to the log.
            - move:
                from: inbox_path
                to:   rejected_path

        # row_filter is empty — all rows are processed.
        # To discard rows by column value, define a filter here.
        # Example: discard rows where TRADE DATE is not a valid date.
        row_filter: []

        # -----------------------------------------------------------------------
        # Constants
        #
        # Values injected by the app at runtime — not read from the source file.
        # Placeholders in braces are substituted when each file is processed.
        #
        #   incoming_file_name   full path of the original inbox file
        #   processed_file_name  full path after move to processing_path
        #   loaded_file_name     full path after move to loaded_path
        #   rejected_file_name   full path after move to rejected_path
        #   record_source        identifies how this record entered the system
        # -----------------------------------------------------------------------

        constants:
          incoming_file_name:  "{incoming_file_name}"
          processed_file_name: "{processed_file_name}"
          loaded_file_name:    "{loaded_file_name}"
          rejected_file_name:  "{rejected_file_name}"
          record_source:       "CSV Import"

        # -----------------------------------------------------------------------
        # Column mapping: DB column name → source file column name
        #
        # Each entry maps the name the database expects to the column header
        # in the source file. field_transforms below handle cleaning and
        # type conversion after this mapping is applied.
        #
        # Columns not listed here are either:
        #   - Injected as constants (see constants: above)
        #   - Derived entirely by field_transforms with no direct source column
        #   - Left NULL (optional fields not present in this file version)
        # -----------------------------------------------------------------------

        columns:
          trade_date:           "TRADE DATE"      # yyyymmdd — transformed below
          office:               "OFFICE"          # originating office code
          account:              "ACCOUNT"         # clearing account identifier
          ac_type:              "A/C TYPE"        # account type code
          buy_sell:             "BUY/SELL"        # trade direction flag
          qty:                  "QTY"             # contract quantity
          exch_id:              "EXCH ID"         # exchange identifier (e.g. CBT)
          contract_name:        "CONTRACT NAME"   # commodity name (e.g. SOYBEANS)
          yyyy_mm:              "YYYY/MM"         # delivery period code (e.g. 202605)
          prompt_date:          "PROMPT DATE"     # delivery date — blank for spot
          strike_price:         "STRIKE PRICE"    # options only — blank for futures
          put_call:             "PUT/CALL"        # options only — blank for futures
          printable_price:      "PRINTABLE PRICE" # display price
          trade_type:           "TRADE TYPE"      # execution type code
          card_order_no:        "CARD/ORDER #"    # order reference number
          currency_code:        "CURRENCY CODE"   # settlement currency
          stype:                "STYPE"           # sub-type flag
          futures_code:         "FUTURES CODE"    # internal futures product code
          sub_cusip:            "SUB CUSIP"       # sub-identifier for the instrument
          cusip:                "CUSIP"           # instrument identifier
          gmi_firm_no:          "GMI FIRM #"      # GMI clearing firm number
          salescode_no:         "SALESCODE #"     # salesperson code
          comment_code:         "COMMENT CODE"    # trade comment flag
          give_in_out:          "GIVE IN/OUT"     # give-in / give-out indicator
          give_in_firm:         "GIVE IN FIRM"    # counterparty firm for give trades
          trade_price:          "TRADE PRICE"     # executed price
          spread:               "SPREAD"          # spread leg indicator
          open_close:           "OPEN/CLOSE"      # position open or close flag
          executing_broker:     "EXECUTING BROKER"
          opposite_broker:      "OPPOSITE BROKER"
          opposite_firm:        "OPPOSITE FIRM"
          commission:           "COMMISSION"      # broker commission amount
          comm_ac_type:         "COMM A/C TYPE"   # account type for commission charge
          fee_1_clearing:       "FEE 1 (CLEARING)"
          fee_1_ac_type:        "FEE 1 A/C TYPE"
          fee_2_exchange:       "FEE 2 (EXCHANGE)"
          fee_2_ac_type:        "FEE 2 A/C TYPE"
          fee_3_nfa:            "FEE 3 (NFA)"     # NFA regulatory fee
          fee_3_ac_type:        "FEE 3 A/C TYPE"
          brokerage_charge:     "BROKERAGE CHARGE"
          bkg_ac_type:          "BKG A/C TYPE"
          give_in_charge:       "GIVE IN CHARGE"
          gi_ac_type:           "G/I A/C TYPE"
          other_charge:         "OTHER CHARGE"
          other_ac_type:        "OTHER A/C TYPE"
          wire_charge:          "WIRE CHARGE"
          wire_ac_type:         "WIRE A/C TYPE"
          entry_date:           "ENTRY DATE"      # yyyy-mm-dd — transformed below
          delete_code:          "DELETE CODE"     # trade cancellation flag
          gmi_tracer_no:        "GMI TRACER #"    # GMI internal reference
          journal_sequence:     "JOURNAL SEQUENCE"
          round_turn_half_turn: "ROUND TURN/HALF TURN" # commission basis flag
          description:          "DESCRIPTION"     # human-readable trade description
          journal_record:       "JOURNAL RECORD"
          sub_account:          "SUB ACCOUNT"
          comment_f_code:       "COMMENT F CODE"
          misc:                 "MISC."
          two_digit_exchange:   "2 DIGIT EXCHANGE" # short exchange code
          future_option:        "FUTURE/OPTION"    # F = future, O = option
          multiplier:           "MULTIPLIER"       # contract size multiplier
          close_price:          "CLOSE PRICE"      # settlement price for the day
          xtp_account:          "XTP ACCOUNT"      # external trading platform account

        # -----------------------------------------------------------------------
        # Field transforms
        #
        # Applied after column mapping. Each entry names a DB column and defines
        # how to clean or convert its value before writing to the output file.
        #
        # Types supported:
        #   date      — parse string to date using format; allow_blank skips
        #               blank values rather than raising an error
        #   numeric   — strip non-numeric characters and parse as decimal;
        #               allow_blank treats blank as NULL rather than 0
        #
        # Columns with no transform entry are passed through as-is (varchar).
        # -----------------------------------------------------------------------

        field_transforms:

          # TRADE DATE arrives as yyyymmdd with no separators — e.g. 20251016
          trade_date:
            type:   date
            format: "%Y%m%d"

          # PROMPT DATE is the futures delivery date, same format as TRADE DATE.
          # Frequently blank for non-delivery rows — allow_blank prevents errors.
          prompt_date:
            type:        date
            format:      "%Y%m%d"
            allow_blank: true

          # ENTRY DATE uses ISO separators unlike the other date columns.
          # Sample value: 2026-04-24
          entry_date:
            type:   date
            format: "%Y-%m-%d"

          # YYYY/MM is a delivery period code — e.g. 202605 means June 2026.
          # Kept as varchar; SQL Server formats it as needed downstream.

          # QTY may contain thousands separators in some file variants.
          qty:
            type:        numeric
            strip_chars: ","

          # STRIKE PRICE is blank for outright futures — allow_blank → NULL.
          strike_price:
            type:        numeric
            allow_blank: true

          printable_price:
            type:        numeric

          trade_price:
            type:        numeric

          # All fee and charge columns default to 0 in the file when not
          # applicable. Parsed as numeric so SQL Server receives clean decimals.
          commission:
            type:        numeric

          fee_1_clearing:
            type:        numeric

          fee_2_exchange:
            type:        numeric

          fee_3_nfa:
            type:        numeric

          brokerage_charge:
            type:        numeric

          give_in_charge:
            type:        numeric

          other_charge:
            type:        numeric

          wire_charge:
            type:        numeric

          # Contract size — e.g. 5000.00 for CBOT Soybeans
          multiplier:
            type:        numeric

          # Settlement price for the trading day
          close_price:
            type:        numeric

    # -------------------------------------------------------------------------
    # Loads
    #
    # A load defines how to take the output of a transform and insert it into
    # the database. Each load references a specific transform by name and
    # version and defines its own file movements on success and failure.
    #
    # The load stage runs independently of the transform stage — it picks up
    # whatever output files are waiting in processing_path matching the
    # pickup_pattern. This means transforms and loads can be run separately
    # or together via the orchestrator in main.py.
    #
    # Load stages:
    #   1. Find output files in processing_path matching pickup_pattern
    #   2. Bulk insert rows into the landing table (fast_executemany)
    #   3. Call the SQL Server stored procedure to promote to final tables
    #   4. Move files per movements: success or failure
    #   5. Write all row errors and counts to the log
    # -------------------------------------------------------------------------

    loads:

      # -----------------------------------------------------------------------
      # Load: transactions_v01
      #
      # Picks up transformed advantage_transactions v01 output files from
      # processing_path and loads them into the database.
      # Full rollback on any row error — entire file moves to rejected_path.
      # -----------------------------------------------------------------------

      - name: advantage_transactions
        version: "v01"
        source: processing_path
        type:           transform           # source is a transform output file
        pickup_pattern: "tran_*_{version}.csv"  # glob in processing_path

        load:
          connection: SQLServer_NaviStage_local
          destination_table:    NaviControl.Advantage_SCH.transaction
          version: "v01"

        movements:
          success:
            # Processed file moves to loaded after a clean database insert.
            - move:
                from: processing_path
                to:   loaded_path
          failure:
            # Any database error triggers full rollback and file moves to rejected.
            # Row-level errors are written to the log before the rollback.
            - move:
                from: processing_path
                to:   rejected_path