# =============================================================================
# Rey Loader — Main Configuration (prod)
#
# Singleton values and global settings only.
# Named instances live in sub-config files under config/db/ and config/data_feeds/
#
# PATH RULES
#   Paths starting with ~   are relative to your home directory
#   All other paths         are treated as absolute
# =============================================================================

# -----------------------------------------------------------------------------
# Logging
# {operation} and {timestamp} are substituted at runtime.
# Each run produces a distinct log file.
# -----------------------------------------------------------------------------

log_path: ~/python/logs/rey_loader/rey_loader.{operation}.{timestamp}.log

# -----------------------------------------------------------------------------
# Data handling
# -----------------------------------------------------------------------------

chunk_size: 500

# -----------------------------------------------------------------------------
# App-level (run) hooks
#
# Bindings that fire once per CLI invocation — pre_run before any data source
# is processed, post_run after all data sources are processed. Each entry
# references a named sql_config from config/app/sql_configs.yaml.
# -----------------------------------------------------------------------------

app_hooks:
  - name:       begin_batch
    sql_config: begin_batch
    hook:       hooks.pre_run

  - name:       end_batch
    sql_config: end_batch
    hook:       hooks.post_run